title = "Ability to open as file selector"
description = 'We should be able to open the app as a file selector and pick 1-n files. Then there should be an action button "Choose" that will then output them as a list to STDOUT. Additionally if needed as support for a filepicker in apps via gtk-portals, it should work there too.'
