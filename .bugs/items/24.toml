author = "Thomas Mathews <thomas.c.mathews@gmail.com>"
body = """
=== REFINEMENTS FROM RESEARCH PASS (corrections to the FFmpeg plan) ===

Confirmed hardware: AMD Radeon 780M (Phoenix1, RDNA3 APU), Mesa radeonsi VA-API (vainfo OK). VA-API is native/first-class here -> it is the PRIMARY decode path; Vulkan Video is only a fallback.

DECODE PATH — pick VA-API DRM-PRIME, NOT Vulkan-Video export:
 - PRIMARY (matches our architecture; keeps video OUT of our Vulkan renderer):
     libavcodec decodes to AV_PIX_FMT_VAAPI surface
     -> av_hwframe_map to AV_PIX_FMT_DRM_PRIME -> AVDRMFrameDescriptor (dmabuf fds + DRM fourcc + MODIFIER)
     -> zwp_linux_buffer_params -> wl_buffer -> video subsurface. No Vulkan, no VK_KHR_external_memory_fd.
 - ALTERNATIVE (Vulkan Video): decode to AV_PIX_FMT_VULKAN (VkImage) then export via VK_KHR_external_memory_fd.
   This PULLS decode into our VkDevice (more coupling) and is newer/less mature. Do NOT lead with this.
   (An earlier research draft fused the VA-API data flow with the Vulkan-Video export call — they are two distinct pipelines.)

NOT drmModePageFlip: we are a Wayland CLIENT. The compositor is DRM master and owns every page flip / plane assignment. Our ONLY path is zwp_linux_dmabuf + subsurface; the compositor promotes to a plane. drmModePageFlip / bare-metal KMS only applies to an app that is its own compositor — kexplore is not. Strike any "schedule onto overlay plane via drmModePageFlip" step.

"ZERO-COPY" IS CONDITIONAL: the exported frame's DRM fourcc + MODIFIER must be in the plane's scanout tranche (zwp_linux_dmabuf_feedback_v1). AMD advertises DCC-compressed modifiers; if the plane rejects the decoder's modifier, the compositor silently copies/composites and scanout is lost. Match the tranche or negotiate a common modifier.

DEPENDENCY LIST — corrected (system libs via `pacman -S ffmpeg`):
 - libavformat  (demux)
 - libavcodec   (decode + hw pipelines)
 - libavutil    (MANDATORY — AVHWDeviceContext, av_hwdevice_ctx_create(VAAPI), av_hwframe_map, AV_PIX_FMT_DRM_PRIME, hwcontext_drm.h all live here)
 - libswresample (audio PCM resample/convert — the audio branch needs it)
 - libswscale    (ONLY for the composited fallback / CPU scale; not needed on the pure hw path)
 Rust wrapper: ffmpeg-next or rsmpeg. RISK: high-level wrappers may not cleanly surface av_hwframe_map / DRM-PRIME / AVDRMFrameDescriptor; budget for dropping to the -sys FFI for the export step. rsmpeg is closer to raw FFI and may be the safer pick for the hwcontext work.

A/V SYNC — concrete algorithm (audio-as-master), corrected present mechanism:
 - Master clock = audio: T_audio = current sample PTS adjusted for cpal-reported output latency. (When there is NO audio track — video-only preview — fall back to a monotonic wall clock.)
 - Per video frame vs master: too early (delta beyond ~a frame interval) -> hold; on time -> PRESENT; lagging -> DROP to catch up. Thresholds tunable; cap present cadence to display refresh.
 - PRESENT here = COMMIT the dmabuf wl_buffer on the video subsurface, paced by the subsurface's frame callbacks + wp_presentation feedback. It is NOT a thread-sleep-then-drmModePageFlip. Decoupled from swapchain repaint (already noted).

LICENSING: decode-only + VAAPI stays LGPL (dynamic link). Avoid GPL-only components (e.g. x264) since we only decode.

libmpv rejection — corroborated. Sharpest reason is not "context deadlocks" but: libmpv has no first-class Vulkan render target, and we don't want mpv to render at all — we want the raw dmabuf for the compositor to scan out. Its only route to that is --vo=dmabuf-wayland (fiddly to embed). Stands."""

