kind = "todo"
title = "Audio + video file previews; video via direct KMS-plane scanout (underlay)"
description = """
Support previewing audio and video files in file nodes (like the current image preview), with video buffered straight to a KMS plane via the compositor's direct scanout. Both kwm and niri support direct scanout AND underlay compositing.

=== CURRENT PREVIEW PIPELINE (baseline) ===
Built for ONE static frame uploaded ONCE:
 - preview::previewable() gates on ext (png/jpg/jpeg/jfif/webp) — src/preview.rs:22
 - double-click -> Tasks::spawn_preview worker -> decode() -> DecodedImage (RGBA8 premult) — src/tasks.rs:88
 - main thread PreviewDone -> make_preview_texture (R8G8B8A8_UNORM) -> one PendingUpload -> attach ImageTex — src/main.rs:242
 - sampled every frame, never touched again.

Already in our favor:
 - record_uploads supports RE-uploading into an existing texture (initialized:true path) — src/gfx/upload.rs. Streaming frames into one persistent texture needs no new GPU plumbing.
 - Event loop already has continuous-repaint (animating flag + poll-timeout/deadline machinery for caret blink / key repeat) — src/main.rs:187,204. A playback clock extends this, not a rewrite.
 - Tasks worker -> mpsc -> wake-pipe seam is a clean place to hang a decode thread.

Two hard walls:
 - NO audio output subsystem exists anywhere. Needs net-new real-time output thread (PipeWire/ALSA) + ring buffer + clock.
 - Decoders emit YUV (NV12/YUV420); our textures are RGBA. Needs YUV->RGB (shader) or CPU convert — UNLESS we go direct-scanout (hardware does it, see below).

=== AUDIO (modest; can stay 100% pure-Rust, no C deps) ===
 - Decode: symphonia (MP3/AAC/FLAC/Vorbis/Opus/WAV), decode-only.
 - Output: cpal (ALSA/PipeWire) — the net-new real-time audio thread.
 - Visual: compute waveform PEAK TABLE on the decode thread, render as a STATIC texture through the existing upload path — elegant fit, no per-frame GPU work, only a moving playhead (animating flag already handles it).
 - Transport UI: play/pause/seek, follows existing node/button patterns.
 - ~5-8 pure-Rust crates. Few focused days. Also builds the audio-output subsystem video needs.

=== VIDEO + DIRECT SCANOUT TO KMS PLANE (real requirement) ===
Framing: a Wayland client NEVER touches KMS. Compositor holds DRM master and PROMOTES an eligible buffer to a hardware plane. Our job = make the video buffer eligible.

Current surface (blocker): kexplore is ONE wl_surface rendered entirely through the Vulkan swapchain (VK_KHR_wayland_surface WSI). No wl_subcompositor, no zwp_linux_dmabuf_v1. Everything (UI + previews) is composited by our renderer into one buffer — which can NEVER be a video plane.

Three eligibility requirements:
 1. Video must be its OWN surface, not composited into ours. Bind wl_subcompositor; a playing video is a wl_subsurface positioned over the file node, carrying its own buffer.
 2. Buffer must be a dmabuf in a plane-compatible format. Bind zwp_linux_dmabuf_v1 (v4); attach via zwp_linux_buffer_params_v1 (DRM-PRIME fd -> wl_buffer). Overlay/underlay planes scan out NV12 natively -> display controller does YUV->RGB AND scaling in fixed-function hw. The shader-conversion problem DISAPPEARS; we never touch the pixels.
 3. Allocate from the compositor's scanout tranche: zwp_linux_dmabuf_feedback_v1 gives per-surface feedback with a "scanout" tranche of formats/modifiers the plane accepts. Match it -> reliably promoted.

Zero-copy pipeline:
 VAAPI hw-decode (NV12 in dmabuf) -> export DRM-PRIME fd -> zwp_linux_buffer_params -> wl_buffer -> attach to video subsurface (scaled via wp_viewport, which we already use) -> compositor promotes to KMS plane -> hw does YUV->RGB + scale, no composite pass. Decoder straight to scanout; never enters our Vulkan renderer or a staging buffer.

Design fit:
 - Occlusion: planes are best-effort + scarce (1-3). Promoted when the video node is on top/unobstructed; silently falls back to composite when another floating node overlaps. Acceptable.
 - Rounded/frosted corners (commits 36140d1, 1ef75ed): RESOLVED by UNDERLAY compositing (kwm + niri support it). Video goes on an underlay plane BELOW the composite; a translucent region in the parent surface lets it show through; rounded/frosted chrome is drawn normally in the composite ABOVE the plane; the plane stays a clean opaque rectangle. If underlay ever doesn't work out, redesign how the preview frame fits.

libmpv vs FFmpeg (decided by the scanout requirement):
 - Direct scanout requires FFmpeg/VAAPI + a hand-rolled dmabuf subsurface. Fits kexplore BETTER than libmpv because we already speak raw Wayland protocol by hand (no toolkit); we own DRM-PRIME export + subsurface in the same style as platform/wayland.rs.
 - libmpv's only route to a plane is --vo=dmabuf-wayland (creates its own subsurface) — embedding it under our wl_display is fiddly and cedes a subsurface to mpv. Reject for the scanout path.

Concrete additions:
 - platform/wayland.rs: bind wl_subcompositor + zwp_linux_dmabuf_v1 (v4).
 - New VideoSurface type: child wl_surface + wl_subsurface + own wp_viewport, sized/positioned to the node rect each frame (layout already computes rects).
 - Decode thread on the Tasks/wake-pipe seam producing DRM-PRIME frames; main thread wraps as wl_buffer and commits on the subsurface with ITS OWN frame callbacks — DECOUPLED from swapchain repaint (video pacing must NOT gate on UI redraws, and must NOT go through the swapchain acquire/present path).
 - Subscribe zwp_linux_dmabuf_feedback_v1 on the video surface; feed scanout tranche formats to the VAAPI allocator.
 - A/V sync: wp_presentation feedback gives real on-screen timestamps to sync the audio clock.

=== SEQUENCING ===
 1. Audio first (pure-Rust, self-contained; builds the audio subsystem video reuses).
 2. Video COMPOSITED first (demux/decode/subsurface/audio-sync working) — this also becomes the permanent fallback path, not throwaway.
 3. Layer dmabuf-feedback + NV12 direct scanout (underlay) as the optimization on top."""
