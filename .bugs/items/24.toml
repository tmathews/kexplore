body = """
=== STRATEGY REVISION: Vulkan Video promoted to PRIMARY (supersedes "VA-API primary" + "NVIDIA non-goal") ===

New context: target machines are THREE — Intel laptop, AMD laptop (780M), NVIDIA gaming PC. Goal: one simplified decode implementation on all three. Vulkan Video is the one standard that does that; nvidia-vaapi-driver (fragile Firefox-targeted shim) is off the table entirely.

COMPLEXITY RESOLVED — we do not write raw Vulkan Video:
 - Raw API (sessions, SPS/PPS parameter objects, DPB/reference-slot management, video queues) is thousands of lines — but libavcodec's Vulkan hwaccel IS that code.
 - App-side is the same shape as the VA-API path: av_hwdevice_ctx_create(VULKAN) instead of (VAAPI), pick AV_PIX_FMT_VULKAN in get_format, av_hwframe_map -> AV_PIX_FMT_DRM_PRIME. Backend difference ~ a constant + a pixel format; both end at the same seam (dmabuf fds + fourcc + modifier + PTS).
 - hwcontext_vulkan carries VK_EXT_external_memory_dma_buf + VK_EXT_image_drm_format_modifier for the dmabuf crossing.
 - COUPLING: FFmpeg creates its OWN private VkDevice on the decode thread. The renderer's VkDevice is untouched. "Pull decode into our VkDevice" is only an optional future optimization (zero-import sampling in the composited fallback), NOT a cost of adoption.

DRIVER STATUS (verified 2026-07):
 - NVIDIA proprietary: most mature Vulkan Video implementation. No shim, no env vars.
 - RADV (AMD): decode default-ON (flag inverted to RADV_PERFTEST_NO_VIDEO_DECODE); H.264/H.265/AV1.
 - ANV (Intel): H.264/H.265 merged, default-on, CTS-passing; AV1 decode in progress. Intel VA-API (gold standard) as fallback.
 - Needs recent FFmpeg (7.x) + recent Mesa. Distro caveat: some distros build Mesa without patented codecs (Fedora -> freeworld pkgs); Arch is fine.

REVISED PLAN:
 - PRIMARY backend: FFmpeg + Vulkan Video hwaccel on a private VkDevice, all three machines.
 - FALLBACK knob (env/config): hwdevice VAAPI on Intel/AMD (identical seam, ~constant swap). Keep the VA-API notes above as the fallback recipe, incl. the Radeon 780M vainfo confirmation.
 - NVIDIA back IN scope for decode. Scanout promotion remains per-machine best-effort: likely on AMD/Intel under kwm/niri, unlikely on desktop NVIDIA (compositor composites — but composited NATIVE decode, no shim).
 - Spike updated: per machine x backend, decode one frame, print fourcc+modifier, diff against zwp_linux_dmabuf_feedback scanout tranche. Also validates av_hwframe_map(VULKAN -> DRM_PRIME) per driver, the one step whose per-driver behavior we haven't proven.
 - Everything downstream of the seam (subsurface, tranche match, underlay, A/V sync, composited fallback) unchanged by this revision."""
