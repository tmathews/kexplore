body = """
=== NVIDIA ASSESSMENT + TWO ACCURACY CORRECTIONS (review pass) ===

NVIDIA + VA-API ROUTE: yes, this is a hard time. Verified against current sources (elFarto/nvidia-vaapi-driver README, 2026):
 - NVIDIA's proprietary driver has NO native VA-API. The only bridge is elFarto's nvidia-vaapi-driver, a third-party shim over NVDEC, which states it is "specifically designed to be used by Firefox... may not operate correctly in other applications."
 - Its EGL backend is BROKEN on driver 525+ (upstream regression); the replacement "direct" backend is experimental and needs NVD_BACKEND=direct + LIBVA_DRIVER_NAME=nvidia env plumbing. Fragile across driver releases.
 - Its dmabuf export is shaped for browser COMPOSITING consumption (multi-plane YUV exported as a single buffer, one modifier — what Chromium's vaapi_wrapper wants), not for KMS scanout. Combined with desktop NVIDIA's historically poor NV12 overlay-plane support, scanout promotion of these buffers is unlikely — the compositor would import + composite instead.
 - NET: on NVIDIA the zero-copy scanout premise collapses to our composited fallback anyway. The NVIDIA-native decode path would be Vulkan Video (first-class on NVIDIA, AV_PIX_FMT_VULKAN) or NVDEC/CUDA — i.e. the ticket's "alternative" path becomes primary there.

DECISION: NVIDIA support is a NON-GOAL for the scanout feature. This is a personal tool running under kwm/niri on an AMD APU (780M/radeonsi). Design consequence that keeps the door open for free: the decode->present seam must be "frame = dmabuf fds + DRM fourcc + modifier + PTS", NOT "frame = VASurface". Any backend (VA-API, Vulkan Video, sw-decode+linear-dmabuf) can fill that contract later; only the VA-API filler gets built now. If the promotion fails or the backend can't export, we land on the composited path, which is the permanent fallback regardless.

CORRECTION 1 (prior comment overstated): "AMD advertises DCC-compressed modifiers" — DCC applies to render targets; VCN DECODE output is NOT DCC-compressed (typically GFX9+ tiled or linear NV12). The real tranche-mismatch risk on AMD is TILED-vs-LINEAR: the decoder emits a tiled modifier and the scanout tranche may want linear (or a different swizzle). Risk stands, mechanism corrected. The spike (decode one frame, print fourcc+modifier, diff against the scanout tranche) answers this empirically either way.

CORRECTION 2 (audio scope nuance): symphonia's AAC support is AAC-LC only — no HE-AAC/SBR. Most .m4a files are AAC-LC so this is acceptable for previews; note it so a silent HE-AAC file isn't chased as a bug later."""

